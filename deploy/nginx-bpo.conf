# Reverse proxy nginx para o bpo-angra.
# Copiar para /etc/nginx/sites-available/bpo e linkar em sites-enabled.
# Trocar bpo.angra.io pelo domínio real antes de aplicar.

server {
    listen 80;
    server_name bpo.angra.io;

    # API NestJS (prefixo global /api, bind 127.0.0.1:5002)
    location /api/ {
        proxy_pass http://127.0.0.1:5002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }

    # Frontend Next.js (next start em 127.0.0.1:5001)
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Após validar em HTTP, rodar:  certbot --nginx -d bpo.angra.io
# O certbot reescreve este server block para 443 + redirect 80->443.
